<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="/static/admin-login.css" />
</head>
<body>
    <main class="login-wrap">
        <section class="login-card">
            <h1>Admin đăng nhập</h1>
            <p>Nhập admin key để xem dashboard thống kê.</p>

            <label for="admin_key">Admin key</label>
            <input id="admin_key" type="password" autocomplete="current-password" />

            <button id="btn_login" type="button">Đăng nhập</button>
            <p id="msg" class="msg"></p>
        </section>
    </main>
    <script src="/static/admin-login.js"></script>
</body>
</html>
