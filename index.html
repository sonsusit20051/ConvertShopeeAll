<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convert FB - Local Entry</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --line: #dfe5f0;
        --text: #1f2a44;
        --muted: #55627c;
        --primary: #1e63f3;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #eef2fb, #f8f9fc);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 30px rgba(20, 38, 84, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .btn {
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        color: var(--text);
        background: #fff;
      }
      .btn.primary {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      code {
        display: block;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 12px;
        font-size: 13px;
        overflow-x: auto;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Local entry</h1>
        <p>Open these after running backend.</p>
        <div class="actions">
          <a class="btn primary" href="http://localhost:8790/" target="_blank" rel="noreferrer">Open Convert</a>
          <a class="btn" href="http://localhost:8790/admin" target="_blank" rel="noreferrer">Open Admin</a>
          <a class="btn" href="http://localhost:8790/api/health" target="_blank" rel="noreferrer">Health</a>
        </div>
        <p>Run local backend:</p>
        <code>cd "/Users/sonmoi/Downloads/Convert FB"
source .venv/bin/activate
uvicorn main:app --host 0.0.0.0 --port 8790 --reload</code>
      </section>
    </main>
  </body>
</html>
